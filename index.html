<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Pusher 🪙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif;user-select:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#score-area{position:fixed;top:48px;left:20px;text-align:center;z-index:12;display:flex;flex-direction:column;align-items:center;gap:6px}
#score-label{color:rgba(0,221,255,0.4);font-size:9px;letter-spacing:3px}
#score{color:#00ddff;font-size:36px;font-weight:900;text-shadow:0 0 30px rgba(0,221,255,0.5);line-height:1}
#combo{position:absolute;top:90px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;opacity:0;transition:opacity 0.3s;white-space:nowrap}
#reset-btn{pointer-events:all;cursor:pointer;background:rgba(255,255,255,0.04);border:none;color:rgba(255,255,255,0.45);font-size:18px;padding:8px 14px;font-family:inherit;transition:all 0.2s;line-height:1}
#reset-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75)}
#level-info{position:fixed;top:18px;right:70px;font-size:13px;font-weight:700;color:#ff44aa;text-shadow:0 0 20px rgba(255,68,170,0.4);white-space:nowrap;text-align:center;z-index:15;background:rgba(10,10,20,0.7);padding:6px 14px;border-radius:10px;border:1px solid rgba(255,68,170,0.2);pointer-events:all;cursor:pointer}
#level-popup{display:none;position:fixed;top:72px;right:70px;z-index:30;background:rgba(5,5,15,0.95);border:1px solid #ff44aa;border-radius:10px;padding:10px 14px;font-size:11px;color:#fff;text-align:left;white-space:nowrap;box-shadow:0 0 20px rgba(255,68,170,0.3)}
#level-popup.show{display:block}
#level-popup .req{display:flex;align-items:center;gap:6px;margin:3px 0}
#level-popup .req.done{color:#00ff88}
#level-popup .req .bar{width:80px;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
#level-popup .req .fill{height:100%;border-radius:3px}
.level-bar-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.level-icon{font-size:14px}
.level-bar{width:60px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.level-fill{height:100%;border-radius:3px;transition:width 0.3s}
.level-fill.coin{background:linear-gradient(90deg,#00ddff,#00aacc)}
.level-fill.diamond{background:linear-gradient(90deg,#44ff44,#88ff88)}
.level-fill.gem{background:linear-gradient(90deg,#ff44aa,#ff88cc)}
.combo-fire{color:#ff4400;text-shadow:0 0 40px rgba(255,68,0,0.5)}
.combo-cascade{color:#ff8800;text-shadow:0 0 60px rgba(255,136,0,0.6)}
.combo-jackpot{color:#ffd700;text-shadow:0 0 80px rgba(255,215,0,0.7);animation:pulse 0.5s infinite alternate}
@keyframes pulse{from{transform:translateX(-50%) scale(1)}to{transform:translateX(-50%) scale(1.15)}}
#btn-panel{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;z-index:20;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.btn-icon{pointer-events:all;cursor:pointer;background:rgba(255,255,255,0.04);border:none;color:rgba(255,255,255,0.45);font-size:18px;padding:8px 14px;font-family:inherit;transition:all 0.2s;line-height:1}
.btn-icon:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75)}
#mute-btn.muted{color:rgba(255,255,255,0.15)}
#auto-btn.active{color:#00ff88;background:rgba(0,255,136,0.12);text-shadow:0 0 10px rgba(0,255,136,0.4)}
#giant-btn{display:none;position:fixed;top:96px;left:20px;pointer-events:all;cursor:pointer;background:linear-gradient(135deg,#ff6600,#cc3300);border:1px solid #ffaa00;color:#fff;font-size:10px;font-weight:900;padding:3px 10px;border-radius:10px;font-family:inherit;z-index:25;text-shadow:0 0 6px rgba(255,255,255,0.5);box-shadow:0 0 18px rgba(255,100,0,0.6);animation:giantPulse 0.6s infinite alternate;letter-spacing:0.5px}
#giant-btn.charged{display:block}
@keyframes giantPulse{from{box-shadow:0 0 15px rgba(255,100,0,0.4)}to{box-shadow:0 0 40px rgba(255,100,0,0.9)}}
#session-time{color:#00ddff;font-size:13px;letter-spacing:2px;font-weight:700;text-shadow:0 0 12px rgba(0,221,255,0.4)}
#status{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.15);font-size:11px;letter-spacing:2px}
#wall-indicator{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:900;color:#ff44aa;text-shadow:0 0 30px rgba(255,68,170,0.6);opacity:0;transition:opacity 0.3s;white-space:nowrap}
#wall-indicator.active{opacity:1;animation:wallPulse 1s infinite alternate}
@keyframes wallPulse{from{text-shadow:0 0 20px rgba(255,68,170,0.5)}to{text-shadow:0 0 60px rgba(255,68,170,0.9)}}
.back-btn{position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:opacity 0.2s}
.back-btn:hover{opacity:0.8}
.back-btn:active{opacity:0.6}
/* ─── MENU OVERLAY ─────────────────────────── */
#menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(10,10,30,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#menu-box{background:rgba(20,20,50,0.9);border:1px solid rgba(0,221,255,0.2);border-radius:24px;padding:40px 48px;text-align:center;max-width:420px;width:90%;box-shadow:0 0 80px rgba(255,68,170,0.1)}
#menu-title{font-size:48px;font-weight:900;background:linear-gradient(135deg,#00ddff,#ff44aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:4px;text-shadow:none}
#menu-sub{color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:4px;margin-bottom:28px}
#menu-name-label{color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:2px;margin-bottom:6px}
#menu-name{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 16px;width:100%;font-size:18px;color:#fff;text-align:center;font-family:inherit;outline:none;transition:border-color 0.2s;box-sizing:border-box;-webkit-appearance:none;-webkit-search-decoration:none;-webkit-search-cancel-button:hidden}
#menu-name:focus{border-color:#00ddff;box-shadow:0 0 20px rgba(0,221,255,0.15)}
#menu-name::placeholder{color:rgba(255,255,255,0.2)}
#menu-play{width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#00ddff,#0088cc);border:none;border-radius:12px;color:#fff;font-size:20px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform 0.15s,box-shadow 0.2s;box-shadow:0 0 30px rgba(0,221,255,0.2)}
#menu-play:hover{transform:scale(1.02);box-shadow:0 0 50px rgba(0,221,255,0.4)}
#menu-play:active{transform:scale(0.98)}
#menu-scores{width:100%;padding:10px;margin-top:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:rgba(255,255,255,0.6);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
#menu-scores:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.2)}
#menu-preview{margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06)}
#menu-preview-title{color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:2px;margin-bottom:8px}
.menu-preview-row{display:flex;align-items:center;justify-content:center;gap:10px;color:rgba(255,255,255,0.5);font-size:13px;padding:3px 0}
.menu-preview-row .rank{color:rgba(255,255,255,0.25);width:20px}
.menu-preview-row .pname{color:#fff;font-weight:600}
.menu-preview-row .pscore{color:#00ddff;font-weight:700}
.menu-preview-empty{color:rgba(255,255,255,0.2);font-size:12px;font-style:italic}
/* ─── LEADERBOARD OVERLAY ──────────────────── */
#lb-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(10,10,30,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#lb-box{background:rgba(20,20,50,0.95);border:1px solid rgba(255,68,170,0.2);border-radius:24px;padding:32px 36px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 0 80px rgba(255,68,170,0.1)}
#lb-title{font-size:28px;font-weight:900;color:#ff44aa;text-shadow:0 0 30px rgba(255,68,170,0.3);margin-bottom:16px;text-align:center}
#lb-table{width:100%;border-collapse:collapse}
#lb-table th{color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:2px;padding:6px 8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06)}
#lb-table td{padding:8px;font-size:14px;color:rgba(255,255,255,0.75);border-bottom:1px solid rgba(255,255,255,0.03)}
#lb-table tr:hover td{background:rgba(255,255,255,0.03)}
#lb-table .lb-rank{color:rgba(255,255,255,0.25);width:30px;font-weight:600}
#lb-table .lb-name{font-weight:600;color:#fff}
#lb-table .lb-coins{color:#00ddff;font-weight:700}
#lb-table .lb-level{color:#ff44aa}
#lb-table .lb-time{color:rgba(255,255,255,0.4)}
#lb-table .lb-date{color:rgba(255,255,255,0.25);font-size:12px}
#lb-back{display:block;margin:16px auto 0;padding:10px 28px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:rgba(255,255,255,0.6);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
#lb-back:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.2)}
#lb-empty{text-align:center;color:rgba(255,255,255,0.25);padding:30px 0;font-size:14px}
</style>
</head>

<a href="/" class="back-btn">← ゲーム一覧</a>

<!-- ─── MENU OVERLAY ──────────────────── -->
<div id="menu-overlay">
  <div id="menu-box">
    <div id="menu-title">COIN PUSHER</div>
    <div id="menu-sub">🪙 ARCADE</div>
    <div id="menu-name-label">ENTER YOUR NAME</div>
    <form autocomplete="off" style="display:inline;margin:0;padding:0"><input type="text" name="dummy" style="display:none" aria-hidden="true"><input id="menu-name" type="search" placeholder="Player" maxlength="16" autocomplete="off" spellcheck="false" data-form-type="other"></form>
    <button id="menu-play">▶ PLAY</button>
    <button id="menu-scores">🏆 SCORES</button>
    <div id="menu-preview">
      <div id="menu-preview-title">TOP PLAYERS</div>
      <div id="menu-preview-list"><div class="menu-preview-empty">No records yet</div></div>
    </div>
  </div>
</div>

<!-- ─── LEADERBOARD OVERLAY ──────────── -->
<div id="lb-overlay">
  <div id="lb-box">
    <div id="lb-title">🏆 LEADERBOARD</div>
    <div id="lb-content">
      <table id="lb-table">
        <thead><tr><th>#</th><th>NAME</th><th>LEVEL</th><th>🪙 COINS</th><th>⏱ TIME</th><th>DATE</th></tr></thead>
        <tbody id="lb-body"></tbody>
      </table>
      <div id="lb-empty" style="display:none">No records yet — be the first!</div>
    </div>
    <button id="lb-back">← BACK TO MENU</button>
  </div>
</div>

<div id="ui">
  <div id="score-area"><div id="score-label">TOKENS</div><div id="score">100</div><button id="giant-btn">💥 GIANT COIN</button><div id="session-time">0:00</div></div>
  <div id="level-info">Lv1 · 🪙0/30</div>
  <div id="level-popup"></div>
  <div id="combo"></div>
  <div id="status">▼ Drop coins ▼</div>
  <div id="wall-indicator">🧱 WALL 15s</div>
  <div id="btn-panel">
    <button id="mute-btn" class="btn-icon" title="Mute">🔊</button>
    <button id="auto-btn" class="btn-icon" title="Auto-drop">⚡</button>
    <button id="menu-btn" class="btn-icon" title="Menu">🏠</button>
    <button id="reset-btn" class="btn-icon" title="Restart">🔄</button>
  </div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import RAPIER from 'https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.14.0/rapier.es.js';
await RAPIER.init();

// ─── SCENE ──────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
const camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 0.1, 40);
camera.position.set(0, 4, 9);
camera.lookAt(0, -0.4, 1.5);
const origCam = camera.position.clone();
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.0;
document.body.prepend(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0x6644aa, 1.8));
const sun = new THREE.DirectionalLight(0xcc88ff, 3.0);
sun.position.set(5, 12, 4); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-10;sun.shadow.camera.right=10;
sun.shadow.camera.top=10;sun.shadow.camera.bottom=-10;
sun.shadow.camera.near=0.5;sun.shadow.camera.far=30;
sun.shadow.bias=-0.0003;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x44ccff, 1.5);
fill.position.set(0, 3, 8); scene.add(fill);

// ─── MATERIALS ──────────────────────────────
const feltMat = new THREE.MeshStandardMaterial({color:0x1a0a2e, roughness:0.9});
const metalMat = new THREE.MeshStandardMaterial({color:0x00ccff, roughness:0.15, metalness:0.95, emissive:0x004466, emissiveIntensity:0.6});
const cabMat = new THREE.MeshStandardMaterial({color:0x0a0a1e, roughness:0.5});
const glassMat = new THREE.MeshPhysicalMaterial({color:0xff44aa, roughness:0, metalness:0, transparent:true, opacity:0.1, side:THREE.DoubleSide});
const platMat = new THREE.MeshStandardMaterial({color:0x1a0a2e, roughness:0.3, metalness:0.4, emissive:0x0a0520, emissiveIntensity:0.3});
const neonPink = new THREE.MeshStandardMaterial({color:0xff44aa, emissive:0xff44aa, emissiveIntensity:1.0, transparent:true, opacity:0.6});
const neonCyan = new THREE.MeshStandardMaterial({color:0x00ddff, emissive:0x00ddff, emissiveIntensity:1.0, transparent:true, opacity:0.6});
const coinPink = new THREE.MeshPhysicalMaterial({color:0xff44aa, metalness:0.5, roughness:0.06, emissive:0xff2288, emissiveIntensity:0.7, clearcoat:0.2, envMapIntensity:2.5});
const coinCyan = new THREE.MeshPhysicalMaterial({color:0x00ddff, metalness:0.5, roughness:0.06, emissive:0x0099cc, emissiveIntensity:0.7, clearcoat:0.2, envMapIntensity:2.5});

// Diamond & Gem collectibles
const diaMat = new THREE.MeshPhysicalMaterial({color:0x44ff44, metalness:0.3, roughness:0.06, emissive:0x22cc22, emissiveIntensity:0.8, clearcoat:0.3});
const gemMat = new THREE.MeshPhysicalMaterial({color:0xff44aa, metalness:0.3, roughness:0.04, emissive:0xcc2288, emissiveIntensity:0.8, clearcoat:0.3});

// ─── DIMENSIONS ─────────────────────────────
const SW = 10, SD = 8, SH = 0.12;
const shelfY = -0.8;
const shelfTop = shelfY + SH/2;  // -0.74

// Moving platform (the "step" — slides back/forth)
const PLAT_W = SW - 0.6;
const PLAT_D = 5.0;
const PLAT_H = 0.1;
const PLAT_Y = shelfTop + 0.28;
const PLAT_TOP = PLAT_Y + PLAT_H/2;
const PLAT_Z_MIN = -2.0;   // retracted
const PLAT_Z_MAX = 0.0;    // extended

// Fixed back wall (behind platform, stops coins on retract)
const BACK_Z = -2.5;
const BACK_H = 0.35;

// ─── LOWER SHELF (green felt) ───────────────
const shelf = new THREE.Mesh(new THREE.BoxGeometry(SW, SH, SD), feltMat);
shelf.position.set(0, shelfY, 0);
shelf.receiveShadow = true;
scene.add(shelf);

// Side neon panels
function addSidePanel(x){
  const p = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.7, SD+0.6), neonPink);
  p.position.set(x, shelfY+0.35, 0);
  scene.add(p);
}
addSidePanel(-SW/2 - 0.15);
addSidePanel(SW/2 + 0.15);

// Trim
function addTrim(x,y,z,w,h,d,mat=metalMat){
  const t = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  t.position.set(x,y,z); t.castShadow=true; scene.add(t);
}
addTrim(-SW/2-0.04, shelfY+SH/2, 0, 0.06, SH+0.02, SD+0.06, neonPink);
addTrim(SW/2+0.04, shelfY+SH/2, 0, 0.06, SH+0.02, SD+0.06, neonPink);

// ─── MOVING PLATFORM ────────────────────────
const platGroup = new THREE.Group();
platGroup.position.set(0, PLAT_Y, PLAT_Z_MIN);
scene.add(platGroup);

const platBody = new THREE.Mesh(new THREE.BoxGeometry(PLAT_W, PLAT_H, PLAT_D), platMat);
platBody.castShadow = true; platBody.receiveShadow = true;
platGroup.add(platBody);

// Platform front edge highlight
const platEdge = new THREE.Mesh(
  new THREE.BoxGeometry(PLAT_W - 0.1, 0.015, 0.06),
  new THREE.MeshStandardMaterial({color:0x00ddff, roughness:0.08, metalness:0.9, emissive:0x006688, emissiveIntensity:0.8})
);
platEdge.position.set(0, PLAT_H/2 + 0.01, PLAT_D/2 - 0.1);
platGroup.add(platEdge);

// Platform side rails
function addRail(x){
  const r = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.05, PLAT_D - 0.1), metalMat);
  r.position.set(x, PLAT_H/2 + 0.025, 0);
  r.castShadow = true; platGroup.add(r);
}
addRail(-PLAT_W/2 + 0.05);
addRail(PLAT_W/2 - 0.05);

// Front pusher face — extends down to push lower shelf coins
const faceH = PLAT_Y + PLAT_H/2 - shelfTop;
const faceY = shelfTop + faceH/2 - PLAT_Y;
const frontFace = new THREE.Mesh(
  new THREE.BoxGeometry(PLAT_W - 0.15, faceH, 0.04),
  new THREE.MeshStandardMaterial({color:0x00ddff, roughness:0.08, metalness:0.9})
);
frontFace.position.set(0, faceY, PLAT_D/2);
frontFace.castShadow = true;
platGroup.add(frontFace);

// ─── FIXED BACK WALL ────────────────────────
const backWall = new THREE.Mesh(
  new THREE.BoxGeometry(PLAT_W + 0.15, BACK_H, 0.1), feltMat);
backWall.position.set(0, PLAT_TOP + BACK_H/2, BACK_Z);
backWall.castShadow = true;
scene.add(backWall);

// ─── 3D TITLE ───────────────────────────────
const titleCanvas = document.createElement('canvas');
titleCanvas.width = 2048; titleCanvas.height = 384;
const tctx = titleCanvas.getContext('2d');
tctx.fillStyle = '#ff44aa';
tctx.font = 'bold 200px "Segoe UI", system-ui, sans-serif';
tctx.textAlign = 'center'; tctx.textBaseline = 'middle';
tctx.shadowColor = '#ff0088'; tctx.shadowBlur = 60;
tctx.fillText('COIN PUSHER', 1024, 192);
tctx.shadowBlur = 0;
tctx.fillText('COIN PUSHER', 1024, 192);
const titleTex = new THREE.CanvasTexture(titleCanvas);
titleTex.minFilter = THREE.LinearFilter;
const titleMat = new THREE.MeshBasicMaterial({map: titleTex, transparent: true, side: THREE.DoubleSide, depthTest: false});
const titleSign = new THREE.Mesh(new THREE.PlaneGeometry(12, 2.25), titleMat);
titleSign.position.set(0, PLAT_TOP + BACK_H + 0.8, BACK_Z);
titleSign.renderOrder = 999;
scene.add(titleSign);

// ─── SPARKLE EFFECTS ──────────────────────
// Canvas glow texture for sparkle particles
function createSparkTexture(innerColor, size = 128) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, innerColor);
  g.addColorStop(0.08, innerColor);
  g.addColorStop(0.4, innerColor + '44');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}
const sparkTexWhite = createSparkTexture('#ffffff');
const sparkTexPink = createSparkTexture('#ff66cc');
const sparkTexCyan = createSparkTexture('#66eeff');

function makeSparkSystem(count, cx, cy, cz, spreadW, spreadH, spreadD, tex, color, size, rOrder) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const data = []; // {tx,ty,tz,phase,speed,threshold}
  for (let i = 0; i < count; i++) {
    const tx = cx + (Math.random() - 0.5) * spreadW;
    const ty = cy + (Math.random() - 0.5) * spreadH;
    const tz = cz + (Math.random() - 0.5) * spreadD;
    pos[i*3] = tx;
    pos[i*3+1] = ty;
    pos[i*3+2] = tz;
    data.push({ tx, ty, tz, phase: Math.random() * Math.PI * 2, speed: 0.03 + Math.random() * 0.09, threshold: 0.25 + Math.random() * 0.65, driftY: (Math.random() - 0.5) * 0.3 });
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    map: tex, color, size, blending: THREE.AdditiveBlending,
    depthTest: false, depthWrite: false, transparent: true,
  });
  const pts = new THREE.Points(geo, mat);
  pts.renderOrder = rOrder;
  scene.add(pts);
  return { pts, data, posArr: pos };
}

// Sparkle animation helper
function animateSparkles(sys, time, showFrac = 0.25) {
  const { data, posArr } = sys;
  for (let i = 0; i < data.length; i++) {
    const d = data[i];
    const b = Math.sin(time * d.speed + d.phase);
    if (b > d.threshold) {
      const s = (b - d.threshold) / (1 - d.threshold); // 0..1 brightness
      posArr[i*3] = d.tx + Math.sin(time * 1.7 + d.phase) * 0.15;
      posArr[i*3+1] = d.ty + Math.sin(time * 2.1 + d.phase) * d.driftY;
      posArr[i*3+2] = d.tz;
    } else {
      posArr[i*3+1] = -999; // hide below scene
    }
  }
  sys.pts.geometry.attributes.position.needsUpdate = true;
}

// ─── PLATFORM ANIMATION ────────────────────
const CYCLE = 5.0;  // Slower cycle — gentler pushing

function updatePlatform(dt){
  if(!gameStarted) return;
  pushTm += dt;
  const t = (pushTm % CYCLE) / CYCLE;
  let p = t < 0.55 ? t/0.55 : 1-(t-0.55)/0.45;
  p = p*p*(3-2*p);
  platZ = PLAT_Z_MIN + p * (PLAT_Z_MAX - PLAT_Z_MIN);
  
  // Move visual
  platGroup.position.z = platZ;
  
  // Move physics
  const pos = platPhys.translation();
  platPhys.setNextKinematicTranslation(new RAPIER.Vector3(pos.x, pos.y, platZ));
}

function playSound(f, d){
  if(muted) return;
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.setValueAtTime(f+Math.random()*300,c.currentTime);
    g.gain.setValueAtTime(0.05,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d);
  }catch(e){}
}
function playCollect(){
  if(muted) return;
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100,1320].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sine';
      o.frequency.setValueAtTime(f,c.currentTime+i*0.04);
      g.gain.setValueAtTime(0.04,c.currentTime+i*0.04);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.04+0.15);
      o.start(c.currentTime+i*0.04);o.stop(c.currentTime+i*0.04+0.15);
    });
  }catch(e){}
}

function checkLevelComplete(){
  const lv = levels[currentLevel];
  if(collected.coins >= lv.coins && collected.diamonds >= lv.diamonds && collected.gems >= lv.gems){

    const bonus = 10 + currentLevel * 5;

// ─── COLLECT ───────────────────────────────
let combo = 0, lastCol = 0, giantCoinCharged = false, diamondSent = false, gemSent = false;
function getMultiplier(c) {
  if (c >= 8) return 5;
  if (c >= 5) return 3;
  if (c >= 3) return 2;
  return 1;
}
function collectCoin(mesh, body){
  const type = coinTypes.get(body.handle) || 'coin';
  world.removeRigidBody(body);
  scene.remove(mesh);
  meshes.delete(body.handle); bodies.delete(mesh.uuid);
  coinTypes.delete(body.handle);
  const now=performance.now();
  combo=(now-lastCol<2000)?combo+1:1;
  lastCol=now;
  const mult = getMultiplier(combo);
  const val = typeValue(type);
  tokens += val * mult;
  sessionCollected += val;  // Track for stats panel
  // Track collectible progress
  collected[type === 'gem' ? 'gems' : type === 'diamond' ? 'diamonds' : 'coins'] += val;
  checkLevelComplete();
  updateLevelPopup();
  document.getElementById('score').textContent = tokens;
  playCollect();
  const c=document.getElementById('combo');
  if(combo>=8){c.textContent=`🎰 JACKPOT x${combo}! ${mult}x`;c.className='combo-jackpot';
    if(!giantCoinCharged){ giantCoinCharged=true; document.getElementById('giant-btn').classList.add('charged'); }
    if(!gemSent){ gemSent=true; spawnSpecialDrop('gem'); }
  }
  else if(combo>=6){c.textContent=`🎰 JACKPOT x${combo}! ${mult}x`;c.className='combo-jackpot';
    if(!giantCoinCharged){ giantCoinCharged=true; document.getElementById('giant-btn').classList.add('charged'); }
  }
  else if(combo>=4){c.textContent=`🌊 CASCADE x${combo}! ${mult}x`;c.className='combo-cascade';
    if(!diamondSent){ diamondSent=true; spawnSpecialDrop('diamond'); }
  }
  else if(combo>=2){c.innerHTML=`🔥 ${combo}x COMBO &middot; ${mult}x`;c.className='combo-fire';}
  else c.style.opacity=0;
  if(combo>=2){c.style.opacity=1;clearTimeout(c._t);c._t=setTimeout(()=>c.style.opacity=0,2500);}
  // 5% chance to activate coin wall
  if(!coinWallActive && Math.random() < 0.05){
    activateCoinWall();
  }
  // Random bonus drops (4% diamond, 1% gem) — independent of combo
  const rr = Math.random();
  if(rr < 0.01){
    spawnSpecialDrop('gem');
  } else if(rr < 0.05){
    spawnSpecialDrop('diamond');
  }
}

// ─── COIN WALL LOGIC ─────────────────────────
function activateCoinWall(){
  coinWallActive = true;
  coinWallTimer = COIN_WALL_DURATION;
  const el = document.getElementById('wall-indicator');
  el.classList.add('active');
}

function updateCoinWall(dt){
  const el = document.getElementById('wall-indicator');
  if(coinWallActive){
    coinWallTimer -= dt;
    el.textContent = `🧱 WALL ${Math.ceil(coinWallTimer)}s`;
    // Animate walls up
    const wy = WALL_Y_ACTIVE;
    wallLeft.mesh.position.y += (wy - wallLeft.mesh.position.y) * Math.min(dt * 8, 1);
    wallRight.mesh.position.y += (wy - wallRight.mesh.position.y) * Math.min(dt * 8, 1);
    wallLeft.body.setNextKinematicTranslation({x: wallLeft.mesh.position.x, y: wallLeft.mesh.position.y, z: 0});
    wallRight.body.setNextKinematicTranslation({x: wallRight.mesh.position.x, y: wallRight.mesh.position.y, z: 0});
    if(coinWallTimer <= 0){
      coinWallActive = false;
      el.classList.remove('active');
    }
  } else {
    // Sink walls back down
    if(wallLeft.mesh.position.y > WALL_Y_HIDDEN + 0.01){
      wallLeft.mesh.position.y += (WALL_Y_HIDDEN - wallLeft.mesh.position.y) * Math.min(dt * 6, 1);
      wallRight.mesh.position.y += (WALL_Y_HIDDEN - wallRight.mesh.position.y) * Math.min(dt * 6, 1);
      wallLeft.body.setNextKinematicTranslation({x: wallLeft.mesh.position.x, y: wallLeft.mesh.position.y, z: 0});
      wallRight.body.setNextKinematicTranslation({x: wallRight.mesh.position.x, y: wallRight.mesh.position.y, z: 0});
    }
  }
}

// ─── GAME LOOP ─────────────────────────────
let lastT = performance.now();
let physAccum = 0;

function loop(time) {
  const rawDt = (time - lastT) / 1000;
  const dt = Math.min(rawDt, 0.1);  // cap spike, allow catch-up
  lastT = time;
  physAccum += dt;

  // Step physics at fixed 30Hz
  let stepped = false;
  while (physAccum >= PHYSICS_DT) {
    world.step();
    updatePlatform(PHYSICS_DT);
    updateCoinWall(PHYSICS_DT);
    physAccum -= PHYSICS_DT;
    stepped = true;
  }

  const sparkTime = performance.now() * 0.001;

  // Update visuals only when physics actually stepped
  if (stepped) {
    animateSparkles(titleSpark, sparkTime);
    animateSparkles(wallSparkL, sparkTime);
    animateSparkles(wallSparkR, sparkTime);
    animateSparkles(backSpark, sparkTime);
    animateSparkles(frontSpark, sparkTime);

    const toRemove = [];
    for (const [h, mesh] of meshes) {
      const body = bodies.get(mesh.uuid);
      if (!body) continue;
      try {
        const p = body.translation(), r = body.rotation();
        mesh.position.set(p.x, p.y, p.z);
        mesh.quaternion.set(r.x, r.y, r.z, r.w);
        if (gameStarted && p.y < COLLECT_Y) toRemove.push({mesh, body});
      } catch(e) {}
    }
    toRemove.sort((a, b) => a.mesh.position.y - b.mesh.position.y);
    toRemove.forEach(({mesh, body}) => collectCoin(mesh, body));
  }

  // Combo timeout (runs every frame — cheap)
  if (combo > 0 && performance.now() - lastCol > 3000) {
    combo = 0;
    document.getElementById('combo').style.opacity = 0;
  }

  // Auto-drop (runs every frame — simple time check)
  if (autoMode && gameStarted && time - autoLastDrop > 4000) {
    if (tokens > 0) {
      dropCoin();
      autoLastDrop = time;
      dropX += autoDir * AUTO_STEP;
      if (dropX >= DROP_X_MAX) { dropX = DROP_X_MAX; autoDir = -1; }
      if (dropX <= DROP_X_MIN) { dropX = DROP_X_MIN; autoDir = 1; }
    }
  }

  indicator.position.set(dropX, shelfTop + 0.3, SD/2 - 0.3);
  camera.lookAt(0, -0.4, 1.5);
  
  // Update session time (top-left)
  if (gameStarted && sessionStart > 0) {
    const elapsed = Math.floor((performance.now() - sessionStart) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    document.getElementById('session-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
  }
  
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// ─── INPUT ─────────────────────────────────
function saveCurrentRecord(){
  const name = localStorage.getItem('cp_playerName') || 'Player';
  const elapsed = sessionStart > 0 ? Math.floor((performance.now() - sessionStart) / 1000) : 0;
  if (sessionCollected <= 0 && tokens === 100) return; // Nothing to save
  const record = {
    name,
    level: currentLevel + 1,
    coins: sessionCollected,
    time: elapsed,
    date: new Date().toISOString().slice(0, 10)
  };
  const records = JSON.parse(localStorage.getItem('cp_records') || '[]');
  records.push(record);
  records.sort((a, b) => b.coins - a.coins);
  if (records.length > 20) records.length = 20;
  localStorage.setItem('cp_records', JSON.stringify(records));
}

function saveAndReset(){
  saveCurrentRecord();
  // Reset game state
  autoMode = false;
  document.getElementById('auto-btn').classList.remove('active');
  for(const [h,mesh] of meshes){
    const body = bodies.get(mesh.uuid);
    if(body){ world.removeRigidBody(body); }
    scene.remove(mesh);
  }
  meshes.clear(); bodies.clear(); coinTypes.clear();
  // Reset tokens
  tokens = 100;
  document.getElementById('score').textContent = tokens;
  combo = 0;
  giantCoinCharged = false; diamondSent = false; gemSent = false;
  currentLevel = 0;
  collected = { coins: 0, diamonds: 0, gems: 0 };
  sessionCollected = 0;
  sessionStart = performance.now();
  updateLevelUI();
  document.getElementById('combo').style.opacity = 0;
  document.getElementById('giant-btn').classList.remove('charged');
  // Reset coin wall
  coinWallActive = false; coinWallTimer = 0;
  wallLeft.mesh.position.y = WALL_Y_HIDDEN;
  wallRight.mesh.position.y = WALL_Y_HIDDEN;
  wallLeft.body.setNextKinematicTranslation({x: wallLeft.mesh.position.x, y: WALL_Y_HIDDEN, z: 0});
  wallRight.body.setNextKinematicTranslation({x: wallRight.mesh.position.x, y: WALL_Y_HIDDEN, z: 0});
  document.getElementById('wall-indicator').classList.remove('active');
  // Re-seed
  seedCoins();
}

// ─── MENU / LEADERBOARD LOGIC ──────────────
function startGame(){
  const name = document.getElementById('menu-name').value.trim() || 'Player';
  localStorage.setItem('cp_playerName', name);
  document.getElementById('menu-overlay').style.display = 'none';
  gameStarted = true;
  sessionStart = performance.now();
  seedCoins();
}
function showLeaderboard(){
  document.getElementById('lb-overlay').style.display = 'flex';
  const records = JSON.parse(localStorage.getItem('cp_records') || '[]');
  const tbody = document.getElementById('lb-body');
  const empty = document.getElementById('lb-empty');
  tbody.innerHTML = '';
  if (records.length === 0) {
    tbody.innerHTML = ''; empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  records.slice(0, 20).forEach((r, i) => {
    const mins = Math.floor(r.time / 60);
    const secs = r.time % 60;
    const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
    const row = document.createElement('tr');
    row.innerHTML = `<td class="lb-rank">${i + 1}</td>
      <td class="lb-name">${r.name}</td>
      <td class="lb-level">Lv${r.level}</td>
      <td class="lb-coins">${r.coins}</td>
      <td class="lb-time">${timeStr}</td>
      <td class="lb-date">${r.date}</td>`;
    tbody.appendChild(row);
  });
}
function updateMenuPreview(){
  const records = JSON.parse(localStorage.getItem('cp_records') || '[]');
  const list = document.getElementById('menu-preview-list');
  if (records.length === 0) {
    list.innerHTML = '<div class="menu-preview-empty">No records yet</div>';
    return;
  }
  let html = '';
  records.slice(0, 3).forEach((r, i) => {
    html += `<div class="menu-preview-row">
      <span class="rank">#${i + 1}</span>
      <span class="pname">${r.name}</span>
      <span class="pscore">${r.coins}🪙</span>
      <span>Lv${r.level}</span>
    </div>`;
  });
  list.innerHTML = html;
}

// Init menu
const savedName = localStorage.getItem('cp_playerName') || '';
document.getElementById('menu-name').value = savedName;
updateMenuPreview();

document.getElementById('menu-play').addEventListener('click', startGame);
document.getElementById('menu-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') startGame(); });
document.getElementById('menu-scores').addEventListener('click', showLeaderboard);
document.getElementById('lb-back').addEventListener('click', () => {
  location.reload();
});
document.getElementById('reset-btn').addEventListener('click', saveAndReset);
document.getElementById('menu-btn').addEventListener('click', () => {
  saveCurrentRecord();
  location.reload();
});

loop(performance.now());
document.getElementById('mute-btn').addEventListener('click',()=>{
  muted=!muted;
  const b=document.getElementById('mute-btn');
  b.textContent=muted?'🔇':'🔊';
  muted?b.classList.add('muted'):b.classList.remove('muted');
});
document.getElementById('auto-btn').addEventListener('click',()=>{
  autoMode = !autoMode;
  const b = document.getElementById('auto-btn');
  if (autoMode) {
    b.classList.add('active');
    autoDir = 1;
    autoLastDrop = performance.now();
    dropX = DROP_X_MIN; // start from left edge
  } else {
    b.classList.remove('active');
  }
});
document.getElementById('giant-btn').addEventListener('click',()=>{
  if(!giantCoinCharged) return;
  giantCoinCharged = false;
  document.getElementById('giant-btn').classList.remove('charged');
  spawnGiantCoin();
});
document.getElementById('level-info').addEventListener('click',()=>{
  const popup = document.getElementById('level-popup');
  updateLevelPopup();
  popup.classList.toggle('show');
});
renderer.domElement.addEventListener('click',(e)=>{if(e.target===renderer.domElement)dropCoin();});
renderer.domElement.addEventListener('mousemove',(e)=>{
  const r=renderer.domElement.getBoundingClientRect();
  const mx=((e.clientX-r.left)/r.width)*2-1;
  dropX=Math.max(DROP_X_MIN,Math.min(DROP_X_MAX,mx*(DROP_X_MAX-DROP_X_MIN)/2));
});
addEventListener('keydown',(e)=>{
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();dropCoin();}
  if(e.code==='ArrowLeft'||e.code==='KeyA'){e.preventDefault();dropX=Math.max(DROP_X_MIN,dropX-0.3);}
  if(e.code==='ArrowRight'||e.code==='KeyD'){e.preventDefault();dropX=Math.min(DROP_X_MAX,dropX+0.3);}
});
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
